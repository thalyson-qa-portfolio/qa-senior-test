name: Tests

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]

jobs:
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prepare output directories
        run: mkdir -p test-output/playwright-report test-output/test-results

      - name: Run API tests
        run: |
          set -o pipefail
          set +e
          npm run test:api 2>&1 | tee playwright-output.txt
          code=${PIPESTATUS[0]}
          echo "$code" > .job-exit-code
          exit "$code"

      - name: API Test Summary
        if: always()
        run: bash .github/scripts/render-job-summary.sh api playwright-output.txt

      - name: Upload API test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-report
          path: |
            test-output/playwright-report/
            test-output/test-results/
          if-no-files-found: ignore
          retention-days: 30

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Prepare output directories
        run: mkdir -p test-output/reports test-output/cucumber-html-report test-output/traces test-output/screenshots test-output/videos

      - name: Run E2E tests
        id: e2e
        env:
          CI: 'true'
        run: |
          set -o pipefail
          set +e
          npm run test:e2e:ci 2>&1 | tee cucumber-output.txt
          code=${PIPESTATUS[0]}
          echo "$code" > .job-exit-code
          exit "$code"

      - name: E2E Test Summary
        if: always()
        run: bash .github/scripts/render-job-summary.sh e2e cucumber-output.txt

      # Dashboard E2E (JSON em reports/ fica no runner para o Job Summary; artifact só o HTML do dashboard)

      - name: Upload E2E report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-report
          path: test-output/cucumber-html-report/
          if-no-files-found: ignore
          retention-days: 30

      # Traces, screenshots e videos quando o step de testes falhou
      - name: Upload E2E failure evidence
        uses: actions/upload-artifact@v4
        if: always() && steps.e2e.outcome == 'failure'
        with:
          name: e2e-failure-evidence
          path: |
            test-output/traces/
            test-output/screenshots/
            test-output/videos/
          if-no-files-found: ignore
          retention-days: 30

  performance-tests:
    name: Performance Tests (K6 smoke)
    runs-on: ubuntu-latest
    # Stages via env (GitHub Variables). Sem --vus/--duration no npm.
    # Variable ausente: defaults abaixo (~30s total, 10 VUs). Defina no GitHub o perfil desejado (ex. 1m/5m/1m e 500).
    env:
      K6_BASE_URL: ${{ vars.K6_BASE_URL }}
      K6_RAMP_DURATION: ${{ vars.K6_RAMP_DURATION || '5s' }}
      K6_LOAD_DURATION: ${{ vars.K6_LOAD_DURATION || '20s' }}
      K6_RAMP_DOWN_DURATION: ${{ vars.K6_RAMP_DOWN_DURATION || '5s' }}
      K6_TARGET_VUS: ${{ vars.K6_TARGET_VUS || vars.K6_VUS || '10' }}
      K6_VUS: ${{ vars.K6_VUS }}
      K6_SLEEP_S: ${{ vars.K6_SLEEP_S }}
      K6_P95_MS: ${{ vars.K6_P95_MS }}
      K6_HTTP_FAIL_RATE_MAX: ${{ vars.K6_HTTP_FAIL_RATE_MAX }}
      K6_ERRORS_RATE_MAX: ${{ vars.K6_ERRORS_RATE_MAX }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prepare K6 output directory
        run: mkdir -p test-output/k6

      - name: Setup K6
        uses: grafana/setup-k6-action@v1

      - name: Run K6 smoke test
        run: |
          set -o pipefail
          set +e
          npm run test:perf:smoke:ci 2>&1 | tee k6-output.txt
          code=${PIPESTATUS[0]}
          echo "$code" > .job-exit-code
          exit "$code"

      - name: Performance Test Summary
        if: always()
        run: bash .github/scripts/render-job-summary.sh k6 k6-output.txt

      - name: Upload K6 report artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-report
          path: |
            k6-output.txt
            test-output/k6/
          if-no-files-found: ignore
          retention-days: 30

  publish-github-pages:
    name: Publish GitHub Pages
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [api-tests, e2e-tests, performance-tests]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download API report artifact
        uses: actions/download-artifact@v4
        with:
          name: api-report
          path: _artifacts/api

      - name: Download E2E report artifact
        uses: actions/download-artifact@v4
        with:
          name: e2e-report
          path: _artifacts/e2e

      - name: Download K6 report artifact
        uses: actions/download-artifact@v4
        with:
          name: k6-report
          path: _artifacts/k6

      # Caminhos após download-artifact podem ser test-output/... ou só a pasta do relatório (comportamento do upload).
      - name: Resolve artifact paths for Pages
        run: |
          set -e
          WS="${{ github.workspace }}"
          api=""
          for d in "$WS/_artifacts/api/test-output/playwright-report" "$WS/_artifacts/api/playwright-report"; do
            if [ -f "$d/index.html" ]; then api="$d"; break; fi
          done
          if [ -z "$api" ]; then
            found=$(find "$WS/_artifacts/api" -type f -path '*/playwright-report/index.html' 2>/dev/null | head -1 || true)
            if [ -n "$found" ]; then api=$(dirname "$found"); fi
          fi
          if [ -z "$api" ]; then
            echo "publish-github-pages: falta API index.html. Ficheiros em _artifacts/api:"
            find "$WS/_artifacts/api" -type f 2>/dev/null | head -120 || true
            exit 1
          fi
          e2e=""
          for d in "$WS/_artifacts/e2e/test-output/cucumber-html-report" "$WS/_artifacts/e2e/cucumber-html-report"; do
            if [ -f "$d/index.html" ]; then e2e="$d"; break; fi
          done
          if [ -z "$e2e" ]; then
            found=$(find "$WS/_artifacts/e2e" -type f -path '*/cucumber-html-report/index.html' 2>/dev/null | head -1 || true)
            if [ -n "$found" ]; then e2e=$(dirname "$found"); fi
          fi
          if [ -z "$e2e" ]; then
            echo "publish-github-pages: falta E2E index.html. Ficheiros em _artifacts/e2e:"
            find "$WS/_artifacts/e2e" -type f 2>/dev/null | head -120 || true
            exit 1
          fi
          k6ok=""
          for f in "$WS/_artifacts/k6/test-output/k6/k6-summary.json" "$WS/_artifacts/k6/k6/k6-summary.json" "$WS/_artifacts/k6/k6-summary.json"; do
            if [ -f "$f" ]; then k6ok=1; break; fi
          done
          if [ -z "$k6ok" ]; then
            echo "publish-github-pages: falta k6-summary.json. Ficheiros em _artifacts/k6:"
            find "$WS/_artifacts/k6" -type f 2>/dev/null | head -120 || true
            exit 1
          fi
          echo "API_SRC=$api" >> "$GITHUB_ENV"
          echo "E2E_SRC=$e2e" >> "$GITHUB_ENV"
          echo "K6_ROOT=$WS/_artifacts/k6" >> "$GITHUB_ENV"
          echo "Pages artifacts OK: API_SRC=$api E2E_SRC=$e2e"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Assemble public site
        run: node scripts/assemble-public-site.js

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Tests

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]

jobs:
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run API tests
        run: |
          set -o pipefail
          npm run test:api 2>&1 | tee playwright-output.txt
          echo ${PIPESTATUS[0]} > .job-exit-code
        continue-on-error: true

      - name: API Test Summary
        if: always()
        run: bash .github/scripts/render-job-summary.sh api playwright-output.txt

      - name: Upload API test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-report
          path: test-output/playwright-report/
          retention-days: 30

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: |
          set -o pipefail
          npm run test:e2e 2>&1 | tee cucumber-output.txt
          echo ${PIPESTATUS[0]} > .job-exit-code
        continue-on-error: true

      - name: E2E Test Summary
        if: always()
        run: bash .github/scripts/render-job-summary.sh e2e cucumber-output.txt

      - name: Upload E2E test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-report
          path: |
            test-output/reports/
            test-output/traces/
            test-output/screenshots/
            test-output/videos/
          retention-days: 30

  performance-tests:
    name: Performance Tests (K6 smoke)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup K6
        uses: grafana/setup-k6-action@v1

      - name: Run K6 smoke test
        run: |
          set -o pipefail
          npm run test:perf:smoke 2>&1 | tee k6-output.txt
          echo ${PIPESTATUS[0]} > .job-exit-code
        continue-on-error: true

      - name: Performance Test Summary
        if: always()
        run: bash .github/scripts/render-job-summary.sh k6 k6-output.txt
